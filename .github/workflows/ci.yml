name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude tl-llvm --exclude tl-wasm --exclude tl-gpu -- -D warnings

      - name: Run tests
        run: cargo test --workspace --exclude tl-llvm --exclude tl-wasm --exclude tl-gpu

      - name: Run tests with SQLite
        run: cargo test --package tl-data --package tl-compiler --package tl-interpreter --package tl-cli --features sqlite
