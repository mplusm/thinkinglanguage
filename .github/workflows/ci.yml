name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C link-arg=-fuse-ld=mold
  RUST_MIN_STACK: 16777216

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install mold linker
        run: sudo apt-get install -y mold

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude tl-llvm --exclude tl-wasm --exclude tl-gpu -- -D warnings

      - name: Run tests
        run: cargo test --workspace --exclude tl-llvm --exclude tl-wasm --exclude tl-gpu

      - name: Run tests with SQLite
        run: cargo test --package tl-data --package tl-compiler --package tl-interpreter --package thinkinglanguage --features sqlite
